name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!CONTRIBUTING.md"
      - "!CUSTOMIZE.md"
      - "!FAQ.md"
      - "!INSTALL.md"
      - "!README.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check image changes
        id: image-changes
        run: |
          IMAGES_CHANGED=true
          if git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
            if git diff --quiet HEAD^1 -- assets/img; then
              IMAGES_CHANGED=false
            fi
          fi
          echo "changed=$IMAGES_CHANGED" >> "$GITHUB_OUTPUT"
      - name: Check purgecss necessity
        id: purgecss-needed
        run: |
          PURGECSS=true
          if git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD^1 HEAD)
            if ! echo "$CHANGED_FILES" | grep -Eq "\.css$|\.scss$|^_sass/|^_layouts/|^_includes/|^assets/css/"; then
              PURGECSS=false
            fi
          fi
          echo "run_purgecss=$PURGECSS" >> "$GITHUB_OUTPUT"
      - name: Check build mode
        id: build-mode
        run: |
          BUILD_MODE=incremental
          if git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD^1 HEAD)
            if echo "$CHANGED_FILES" | grep -Eq "^_config(\\..*)?\\.yml$|^Gemfile$|^Gemfile\\.lock$|^_layouts/|^_includes/|^_data/|^_pages/|^_news/|^_projects/|^_bibliography/|^assets/js/"; then
              BUILD_MODE=full
            fi
          else
            BUILD_MODE=full
          fi
          echo "incremental=$BUILD_MODE" >> "$GITHUB_OUTPUT"
      - name: Restore Jekyll cache
        if: steps.build-mode.outputs.incremental == 'incremental'
        uses: actions/cache@v4
        with:
          path: |
            .jekyll-cache
            .jekyll-metadata
          key: ${{ runner.os }}-jekyll-cache-${{ hashFiles('Gemfile.lock', '_config.yml', '_config.no-imagemagick.yml', '_config.fast.yml', '_config.ci-generated-images.yml') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-cache-
      - name: Restore responsive image cache
        id: responsive-image-cache
        uses: actions/cache/restore@v4
        with:
          path: .responsive-image-cache
          key: ${{ runner.os }}-responsive-images-${{ hashFiles('_config.yml', '_config.ci-generated-images.yml', '.github/scripts/generate-responsive-images.rb', 'assets/img/**') }}
          restore-keys: |
            ${{ runner.os }}-responsive-images-
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler-cache: true
      - name: Setup Node.js for PurgeCSS
        if: steps.purgecss-needed.outputs.run_purgecss == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore node_modules for PurgeCSS
        id: purgecss-node-cache
        if: steps.purgecss-needed.outputs.run_purgecss == 'true'
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          valueFile: "_config.yml"
          propertyPath: "giscus.repo"
          value: ${{ github.repository }}
      - name: Resolve Jekyll config chain
        id: jekyll-config
        run: |
          JEKYLL_CONFIGS="_config.yml,_config.ci-generated-images.yml"

          if [[ "${{ steps.build-mode.outputs.incremental }}" == "incremental" ]]; then
            JEKYLL_CONFIGS="$JEKYLL_CONFIGS,_config.fast.yml"
          fi

          echo "configs=$JEKYLL_CONFIGS" >> "$GITHUB_OUTPUT"
      - name: Install and Build 🔧
        run: |
          export JEKYLL_ENV=production
          JEKYLL_INCREMENTAL_FLAG=""
          if [[ "${{ steps.build-mode.outputs.incremental }}" == "incremental" ]]; then
            JEKYLL_INCREMENTAL_FLAG="--incremental"
          fi

          bundle exec jekyll build --config "${{ steps.jekyll-config.outputs.configs }}" $JEKYLL_INCREMENTAL_FLAG
      - name: Install ImageMagick
        if: steps.responsive-image-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick
      - name: Restore generated responsive images
        run: ruby .github/scripts/generate-responsive-images.rb
      - name: Save responsive image cache
        if: github.event_name != 'pull_request' && steps.responsive-image-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .responsive-image-cache
          key: ${{ steps.responsive-image-cache.outputs.cache-primary-key }}
      - name: Purge unused CSS 🧹
        if: steps.purgecss-needed.outputs.run_purgecss == 'true'
        run: |
          if [[ "${{ steps.purgecss-node-cache.outputs.cache-hit }}" != 'true' ]]; then
            npm ci --no-audit --no-fund
          fi
          ./node_modules/.bin/purgecss -c purgecss.config.js
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
